<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Колесо фортуны</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #1a1a2e;
            --surface: #16213e;
            --text: #eee;
            --accent: #e94560;
            --input-bg: #0f3460;
            --border: #0f3460;
            --muted-text: #aaa;
            --radius: 20px;
            --shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        body.light-theme {
            --bg: #f0f2f5;
            --surface: #ffffff;
            --text: #222;
            --accent: #c62828;
            --input-bg: #e0e0e0;
            --border: #ccc;
            --muted-text: #555;
            --shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
            transition: background 0.3s, color 0.3s;
            gap: 20px;
        }
        .top-bar {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            transition: filter 0.3s;
        }
        .slogan {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--accent);
            flex: 1;
            text-align: left;
        }
        .right-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        #localTime {
            font-size: 0.9rem;
            background: var(--surface);
            padding: 4px 12px;
            border-radius: 20px;
            box-shadow: var(--shadow);
        }
        .theme-toggle {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            transition: transform 0.4s ease;
        }
        .theme-toggle[data-theme="dark"]:hover { transform: rotate(12deg); }
        .theme-toggle[data-theme="light"]:hover { transform: scale(1.2); }
        .settings-btn {
            background: none;
            border: none;
            color: var(--text);
            font-size: 1.8rem;
            cursor: pointer;
            transition: transform 0.4s ease-out;
        }
        .settings-btn:hover {
            transform: rotate(720deg);
            transition: transform 1.2s cubic-bezier(.2,.8,.4,1);
        }
        .user-badge {
            display: none;
            align-items: center;
            gap: 8px;
            background: var(--surface);
            padding: 6px 12px;
            border-radius: 30px;
            box-shadow: var(--shadow);
        }
        .user-badge img {
            width: 30px; height: 30px;
            border-radius: 50%;
            border: 2px solid var(--accent);
        }
        .main-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .wheel-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .wheel-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1 / 1;
            transition: transform 0.4s, filter 0.3s;
            z-index: 1;
        }
        body.spinning .wheel-container {
            transform: scale(1.35);
            z-index: 100;
        }
        canvas#wheelCanvas {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.6));
        }
        .pin {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 30px;
            z-index: 10;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
            transition: transform 0.1s;
        }
        .pin svg { width: 100%; height: 100%; fill: var(--accent); }
        .pin.bump {
            animation: pinBump 0.1s ease;
        }
        @keyframes pinBump {
            0% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(6px); }
            100% { transform: translateX(-50%) translateY(0); }
        }
        .spin-btn {
            margin-top: 20px;
            padding: 14px 40px;
            font-size: 1.2rem;
            font-weight: 700;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            letter-spacing: 1px;
            box-shadow: 0 8px 20px rgba(233,69,96,0.5);
            transition: 0.3s;
        }
        .spin-btn:disabled {
            background: #555;
            cursor: not-allowed;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .options-panel {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
            transition: filter 0.3s;
        }
        .chance-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .fast-spin-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .toggle-label { font-size: 1rem; font-weight: 500; }
        .switch { position: relative; width: 54px; height: 28px; }
        .switch input { display: none; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--accent); border-radius: 28px; transition: 0.3s;
        }
        .slider:before {
            position: absolute; content: ""; height: 22px; width: 22px;
            left: 3px; bottom: 3px; background-color: white; border-radius: 50%; transition: 0.3s;
        }
        input:checked + .slider { background-color: #4caf50; }
        input:checked + .slider:before { transform: translateX(26px); }
        .option-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        .option-row input[type="text"] {
            flex: 1;
            padding: 10px 14px;
            border-radius: 10px;
            border: none;
            background: var(--input-bg);
            color: var(--text);
            font-size: 0.95rem;
        }
        .weight-input {
            width: 60px;
            padding: 10px 6px;
            border-radius: 10px;
            border: none;
            background: var(--input-bg);
            color: #f5c518;
            text-align: center;
            font-weight: 600;
        }
        .delete-option {
            background: var(--accent);
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }
        .delete-option:hover { transform: scale(1.15); }
        .options-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .add-btn, .presets-btn, .mass-add-btn {
            flex: 1;
            padding: 12px 8px;
            border: 2px dashed var(--accent);
            background: transparent;
            color: var(--accent);
            font-size: 1.2rem;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .add-btn:hover, .presets-btn:hover, .mass-add-btn:hover {
            background: rgba(233,69,96,0.1);
            transform: scale(1.03);
            border-style: solid;
        }
        .clear-btn {
            width: 100%;
            padding: 14px;
            margin-top: 12px;
            border: 2px solid var(--accent);
            background: transparent;
            color: var(--accent);
            font-size: 1rem;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(233,69,96,0.05);
        }
        .clear-btn:hover {
            background: var(--accent);
            color: white;
        }

        /* Лидерборд с вкладками */
        .leaderboard {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 15px;
            box-shadow: var(--shadow);
            transition: filter 0.3s;
        }
        .tab-switch {
            position: relative;
            display: flex;
            background: var(--input-bg);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 15px;
        }
        .tab-option {
            flex: 1;
            text-align: center;
            padding: 8px 12px;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--muted-text);
            cursor: pointer;
            z-index: 1;
            transition: color 0.3s;
            user-select: none;
        }
        .tab-option.active {
            color: var(--text);
        }
        .tab-background {
            position: absolute;
            top: 4px; bottom: 4px; left: 4px;
            width: calc(50% - 4px);
            background: var(--accent);
            border-radius: 10px;
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.3, 1);
        }
        .tab-switch.friends .tab-background {
            transform: translateX(100%);
        }

        .leaderboard-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .top-player {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 10px;
            background: var(--input-bg);
            border-radius: 14px;
            transition: background 0.2s;
        }
        .position {
            width: 24px;
            text-align: center;
            font-weight: 700;
            color: var(--accent);
        }
        .top-player img {
            width: 36px; height: 36px;
            border-radius: 50%;
            border: 2px solid var(--accent);
        }
        .player-name {
            flex: 1;
            font-weight: 500;
        }
        .player-spins {
            font-weight: 700;
            color: var(--accent);
        }
        .contact-prompt {
            text-align: center;
            padding: 20px;
            color: var(--muted-text);
        }
        .contact-prompt button {
            margin-top: 10px;
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Размытие фона при вращении */
        body.spinning .top-bar,
        body.spinning .options-panel,
        body.spinning .leaderboard {
            filter: blur(6px);
            pointer-events: none;
        }

        /* Результат */
        .result-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75); display: flex; justify-content: center; align-items: center;
            z-index: 300; opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .result-overlay.active { opacity: 1; pointer-events: auto; }
        .result-content {
            background: var(--surface); padding: 40px 40px; border-radius: 30px;
            text-align: center; transform: scale(0.8); transition: 0.3s;
            width: 90%;
            max-width: 350px;
        }
        .result-overlay.active .result-content { transform: scale(1); }
        .result-text {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent);
            display: block;
            margin: 15px 0 25px;
        }
        .result-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 10px;
        }

        .modal {
            display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); justify-content: center; align-items: center;
            z-index: 200; opacity: 0; pointer-events: none; transition: 0.25s;
        }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: var(--surface); padding: 30px; border-radius: 24px;
            width: 90%; max-width: 400px; transform: scale(0.9); transition: 0.25s;
            color: var(--text);
        }
        .modal.active .modal-content { transform: scale(1); }
        .modal-content h2 { margin-bottom: 20px; font-size: 1.5rem; }
        .modal-content textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            border-radius: 10px;
            border: none;
            background: var(--input-bg);
            color: var(--text);
            font-family: inherit;
            margin-bottom: 15px;
            resize: vertical;
        }
        .modal-content button {
            padding: 10px 24px; border: none; border-radius: 30px;
            background: var(--accent); color: white; font-weight: 600; margin-right: 10px; transition: 0.2s;
        }
        .volume-row { display: flex; align-items: center; gap: 12px; }
        .volume-row input[type="range"] { flex: 1; }
        .presets-list {
            list-style: none;
            margin: 10px 0;
            max-height: 200px;
            overflow-y: auto;
        }
        .presets-list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            background: var(--input-bg);
            border-radius: 12px;
            margin-bottom: 8px;
        }
        .presets-list li span {
            font-weight: 500;
        }
        .presets-list li button {
            background: var(--accent);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        @media (min-width: 500px) {
            .wheel-container { max-width: 450px; }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="slogan" id="slogan">✨ Удача ждёт тебя!</div>
        <div class="right-group">
            <span id="localTime">00:00</span>
            <button class="theme-toggle" id="themeToggle" data-theme="dark">🌙</button>
            <div class="user-badge" id="userBadge">
                <img id="userAvatar" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='%23e94560'/%3E%3C/svg%3E" alt="avatar">
                <span id="userNickDisplay"></span>
            </div>
            <button class="settings-btn" id="openSettings">⚙️</button>
        </div>
    </div>

    <div class="main-container">
        <div class="wheel-wrapper">
            <div class="wheel-container" id="wheelContainer">
                <canvas id="wheelCanvas" width="400" height="400"></canvas>
                <div class="pin" id="pin">
                    <svg viewBox="0 0 28 36">
                        <path d="M14 36 C22 24 28 14 28 10 C28 4.5 21.7 0 14 0 C6.3 0 0 4.5 0 10 C0 14 6 24 14 36Z" />
                        <circle cx="14" cy="12" r="4.5" fill="white" />
                        <circle cx="14" cy="12" r="2" fill="#e0e0e0" />
                    </svg>
                </div>
            </div>
            <button class="spin-btn" id="spinButton" disabled>🎡 Крутить!</button>
        </div>

        <div class="options-panel">
            <div class="chance-toggle">
                <span class="toggle-label">🎲 Шансы</span>
                <label class="switch">
                    <input type="checkbox" id="chanceSwitch">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="fast-spin-toggle">
                <span class="toggle-label">⚡ Быстрый спин</span>
                <label class="switch">
                    <input type="checkbox" id="fastSpinSwitch">
                    <span class="slider"></span>
                </label>
            </div>
            <div id="optionsList"></div>
            <div class="options-actions">
                <button class="add-btn" id="addOptionBtn">+</button>
                <button class="mass-add-btn" id="massAddBtn">✍️</button>
                <button class="presets-btn" id="presetsBtn">📋</button>
            </div>
            <button class="clear-btn" id="clearAllBtn">🗑️ Очистить всё</button>
        </div>

        <div class="leaderboard">
            <div class="tab-switch" id="tabSwitch">
                <div class="tab-background"></div>
                <div class="tab-option active" data-tab="world">Мир</div>
                <div class="tab-option" data-tab="friends">Друзья</div>
            </div>
            <div class="leaderboard-list" id="topListContainer"></div>
        </div>
    </div>

    <div class="result-overlay" id="resultOverlay">
        <div class="result-content">
            <h2 style="margin-top:0;">🎉 Поздравляем, Ваш результат:</h2>
            <span class="result-text" id="resultText"></span>
            <div class="result-buttons">
                <button id="closeResultBtn" style="background: var(--accent); color: white; border: none; padding: 12px 30px; border-radius: 30px; font-size: 1rem; cursor: pointer;">Закрыть</button>
                <button id="shareResultBtn" style="background: #4caf50; color: white; border: none; padding: 12px 30px; border-radius: 30px; font-size: 1rem; cursor: pointer;">📤 Поделиться</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно массового добавления -->
    <div class="modal" id="massAddModal">
        <div class="modal-content">
            <h2>✍️ Массовое добавление</h2>
            <p style="margin-bottom: 8px;">Введите варианты через запятую или каждый с новой строки:</p>
            <textarea id="massAddTextarea" placeholder="Пицца, Бургер, Салат..."></textarea>
            <button id="applyMassAdd">Добавить</button>
            <button id="closeMassAddModal">Закрыть</button>
        </div>
    </div>

    <!-- Модальное окно пресетов -->
    <div class="modal" id="presetsModal">
        <div class="modal-content">
            <h2>📋 Пресеты вариантов</h2>
            <div style="display: flex; gap: 8px; margin-bottom: 15px;">
                <input type="text" id="presetNameInput" placeholder="Название пресета" style="flex:1; padding:10px; border-radius:10px; border:none; background:var(--input-bg); color:var(--text);">
                <button id="savePresetBtn">💾 Сохранить</button>
            </div>
            <ul class="presets-list" id="presetsList"></ul>
            <button id="closePresetsModal" style="margin-top:10px;">Закрыть</button>
        </div>
    </div>

    <!-- Модальное окно настроек -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <h2>⚙️ Настройки</h2>
            <label>Никнейм</label>
            <input type="text" id="nicknameInput" placeholder="Твой ник...">
            <label>🔊 Громкость</label>
            <div class="volume-row">
                <input type="range" id="volumeSlider" min="0" max="100" value="50">
                <span id="volumeValue">50%</span>
            </div>
            <label><input type="checkbox" id="muteCheckbox"> 🔇 Без звука</label>
            <div style="margin-top:24px;">
                <button id="saveSettings">💾 Сохранить</button>
                <button id="closeSettings">✖ Закрыть</button>
            </div>
        </div>
    </div>

<script>
    // Telegram Mini App
    const tg = window.Telegram.WebApp;
    tg.ready();

    // Firebase (ваши ключи)
    let db = null;
    try {
        const firebaseConfig = {
            apiKey: "AIzaSyBG_pWCBwZZn0q5uq2qo7OyL1gE8Wy-ipw",
            authDomain: "fortunef3s-bot.firebaseapp.com",
            databaseURL: "https://fortunef3s-bot-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "fortunef3s-bot",
            storageBucket: "fortunef3s-bot.firebasestorage.app",
            messagingSenderId: "346933796337",
            appId: "1:346933796337:web:75264443e0c3de75273850"
        };
        firebase.initializeApp(firebaseConfig);
        db = firebase.database();
        console.log('Firebase ready');
    } catch (e) {
        console.warn('No Firebase:', e);
    }

    let currentUserTelegramId = null;
    let currentUserData = null;
    let allUsersData = [];
    let friendIds = new Set();
    let currentTab = 'world';

    const initData = tg.initDataUnsafe;
    if (initData && initData.user) {
        const user = initData.user;
        currentUserTelegramId = user.id.toString();
        const firstName = user.first_name || 'Пользователь';
        const username = user.username || '';
        const photoUrl = user.photo_url || '';

        const badge = document.getElementById('userBadge');
        badge.style.display = 'flex';
        document.getElementById('userNickDisplay').textContent = firstName;
        if (photoUrl) document.getElementById('userAvatar').src = photoUrl;

        if (db) {
            const userRef = db.ref('users/' + currentUserTelegramId);
            userRef.once('value').then(snap => {
                if (!snap.exists()) {
                    userRef.set({
                        telegramId: currentUserTelegramId,
                        firstName, username, photoUrl,
                        nickname: firstName,
                        spins: 0,
                        createdAt: firebase.database.ServerValue.TIMESTAMP
                    });
                } else {
                    userRef.update({ firstName, username, photoUrl });
                }
                db.ref('users/' + currentUserTelegramId).on('value', snap => {
                    const data = snap.val();
                    if (data) {
                        currentUserData = data;
                        document.getElementById('userNickDisplay').textContent = data.nickname || data.firstName;
                        if (data.photoUrl) document.getElementById('userAvatar').src = data.photoUrl;
                    }
                });
                loadAllUsers();
            }).catch(err => console.warn(err));
        }
    }

    function loadAllUsers() {
        if (!db) return;
        db.ref('users').orderByChild('spins').limitToLast(50).on('value', snap => {
            allUsersData = [];
            if (snap.exists()) {
                snap.forEach(child => allUsersData.push({ id: child.key, ...child.val() }));
            }
            allUsersData.sort((a, b) => b.spins - a.spins);
            renderLeaderboard();
        });
    }

    function fetchContacts(callback) {
        if (typeof tg.getContacts === 'function') {
            tg.getContacts((contacts) => {
                if (contacts && Array.isArray(contacts)) {
                    friendIds.clear();
                    contacts.forEach(c => friendIds.add(c.id.toString()));
                    callback(true);
                } else {
                    callback(false);
                }
            });
        } else {
            callback(false);
        }
    }

    function renderLeaderboard() {
        const container = document.getElementById('topListContainer');
        container.innerHTML = '';
        if (currentTab === 'world') {
            renderWorldTab(container);
        } else {
            renderFriendsTab(container);
        }
    }

    function renderWorldTab(container) {
        if (allUsersData.length === 0) {
            container.innerHTML = '<div class="contact-prompt">Пока нет игроков</div>';
            return;
        }
        allUsersData.slice(0, 10).forEach((u, i) => {
            container.appendChild(createPlayerElement(u, i + 1));
        });
    }

    function renderFriendsTab(container) {
        if (friendIds.size === 0) {
            container.innerHTML = `
                <div class="contact-prompt">
                    Чтобы увидеть друзей, разрешите доступ к контактам Telegram.
                    <br><br>
                    <button onclick="requestContacts()">Разрешить доступ</button>
                </div>`;
            return;
        }
        const friends = allUsersData.filter(u => friendIds.has(u.telegramId));
        if (friends.length === 0) {
            container.innerHTML = '<div class="contact-prompt">Ваши друзья ещё не играли</div>';
            return;
        }
        friends.slice(0, 10).forEach((u, i) => {
            container.appendChild(createPlayerElement(u, i + 1));
        });
    }

    function createPlayerElement(u, position) {
        const div = document.createElement('div');
        div.className = 'top-player';

        const posSpan = document.createElement('span');
        posSpan.className = 'position';
        posSpan.textContent = position;
        div.appendChild(posSpan);

        const img = document.createElement('img');
        img.src = u.photoUrl || 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"%3E%3Ccircle cx="16" cy="16" r="16" fill="%23e94560"/%3E%3C/svg%3E';
        img.alt = u.nickname || u.firstName;
        div.appendChild(img);

        const nameSpan = document.createElement('span');
        nameSpan.className = 'player-name';
        nameSpan.textContent = u.nickname || u.firstName;
        div.appendChild(nameSpan);

        const spinsSpan = document.createElement('span');
        spinsSpan.className = 'player-spins';
        spinsSpan.textContent = '🔄 ' + (u.spins || 0);
        div.appendChild(spinsSpan);

        return div;
    }

    window.requestContacts = function() {
        fetchContacts((success) => {
            if (success) {
                renderLeaderboard();
            } else {
                const container = document.getElementById('topListContainer');
                container.innerHTML = '<div class="contact-prompt">Не удалось получить контакты. Убедитесь, что вы дали разрешение в настройках Telegram.</div>';
            }
        });
    };

    const tabSwitch = document.getElementById('tabSwitch');
    const tabOptions = document.querySelectorAll('.tab-option');
    tabOptions.forEach(option => {
        option.addEventListener('click', () => {
            const tab = option.dataset.tab;
            if (tab === currentTab) return;
            currentTab = tab;
            tabOptions.forEach(opt => opt.classList.remove('active'));
            option.classList.add('active');
            if (tab === 'friends') {
                tabSwitch.classList.add('friends');
                if (friendIds.size === 0) {
                    fetchContacts((success) => {
                        if (!success) {
                            renderLeaderboard();
                        } else {
                            renderLeaderboard();
                        }
                    });
                } else {
                    renderLeaderboard();
                }
            } else {
                tabSwitch.classList.remove('friends');
                renderLeaderboard();
            }
        });
    });

    // ----- КОЛЕСО ФОРТУНЫ -----
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const spinBtn = document.getElementById('spinButton');
    const pinElement = document.getElementById('pin');
    let options = [];
    let useWeights = false;
    let fastSpin = false;
    let isSpinning = false;
    let currentAngle = 0;
    let spinVelocity = 0;
    let spinDecay = 0.98;
    let animationFrameId = null;
    const baseColors = ['#e94560','#0f3460','#f5c518','#16213e','#53d8a0','#a45ee9','#ff6b6b','#4ecdc4'];
    const MIN_SEGMENTS = 8;

    function sectorGradient(x, y, r, startAngle, endAngle, baseColor) {
        const grad = ctx.createLinearGradient(
            x + r * Math.cos(startAngle + (endAngle-startAngle)/2),
            y + r * Math.sin(startAngle + (endAngle-startAngle)/2),
            x + r * 0.2 * Math.cos(startAngle + (endAngle-startAngle)/2),
            y + r * 0.2 * Math.sin(startAngle + (endAngle-startAngle)/2)
        );
        grad.addColorStop(0, baseColor);
        grad.addColorStop(1, '#ffffff30');
        return grad;
    }

    function drawWheel() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radius = Math.min(centerX, centerY) - 20;

        if (options.length < 2) {
            const numSegments = MIN_SEGMENTS;
            const sliceAngle = (2 * Math.PI) / numSegments;
            for (let i = 0; i < numSegments; i++) {
                const startAngle = currentAngle + i * sliceAngle;
                const endAngle = startAngle + sliceAngle;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();
                const baseColor = baseColors[i % baseColors.length];
                ctx.fillStyle = sectorGradient(centerX, centerY, radius, startAngle, endAngle, baseColor);
                ctx.fill();
                ctx.strokeStyle = '#ffffff33';
                ctx.lineWidth = 1;
                ctx.stroke();
            }
            // палочки
            const pegRadius = 6;
            const pegDistance = radius + 4;
            ctx.fillStyle = '#ffffff';
            ctx.strokeStyle = '#aaaaaa';
            for (let i = 0; i < numSegments; i++) {
                const angle = currentAngle + i * sliceAngle + sliceAngle / 2;
                const pegX = centerX + pegDistance * Math.cos(angle);
                const pegY = centerY + pegDistance * Math.sin(angle);
                ctx.beginPath();
                ctx.arc(pegX, pegY, pegRadius, 0, 2 * Math.PI);
                ctx.fill();
                ctx.stroke();
            }
        } else {
            const totalWeight = options.reduce((sum, opt) => sum + (useWeights ? opt.weight : 1), 0);
            let startAngle = currentAngle;
            options.forEach((opt, i) => {
                const weight = useWeights ? opt.weight : 1;
                const sliceAngle = (2 * Math.PI) * (weight / totalWeight);
                const endAngle = startAngle + sliceAngle;

                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();
                const baseColor = baseColors[i % baseColors.length];
                ctx.fillStyle = sectorGradient(centerX, centerY, radius, startAngle, endAngle, baseColor);
                ctx.fill();
                ctx.strokeStyle = '#ffffff33';
                ctx.lineWidth = 1;
                ctx.stroke();

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(startAngle + sliceAngle / 2);
                ctx.textAlign = "center";
                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 16px 'Segoe UI'";
                ctx.shadowColor = '#00000080';
                ctx.shadowBlur = 4;
                ctx.fillText(opt.label || '?', radius * 0.7, 6);
                ctx.shadowColor = 'transparent';
                ctx.shadowBlur = 0;
                ctx.restore();

                startAngle = endAngle;
            });

            const pegRadius = 6;
            const pegDistance = radius + 4;
            ctx.fillStyle = '#ffffff';
            ctx.strokeStyle = '#aaaaaa';
            startAngle = currentAngle;
            options.forEach((opt, i) => {
                const weight = useWeights ? opt.weight : 1;
                const sliceAngle = (2 * Math.PI) * (weight / totalWeight);
                const pegAngle = startAngle + sliceAngle / 2;
                const pegX = centerX + pegDistance * Math.cos(pegAngle);
                const pegY = centerY + pegDistance * Math.sin(pegAngle);
                ctx.beginPath();
                ctx.arc(pegX, pegY, pegRadius, 0, 2 * Math.PI);
                ctx.fill();
                ctx.stroke();
                startAngle += sliceAngle;
            });
        }

        ctx.beginPath();
        ctx.arc(centerX, centerY, 20, 0, 2*Math.PI);
        ctx.fillStyle = '#ffffff';
        ctx.fill();
        ctx.strokeStyle = '#aaaaaa';
        ctx.lineWidth = 2;
        ctx.stroke();
    }

    function idleSpin() {
        if (options.length === 0) {
            currentAngle += 0.02;
            drawWheel();
            animationFrameId = requestAnimationFrame(idleSpin);
        }
        updateSpinButtonState();
    }

    function updateSpinButtonState() {
        const filled = options.filter(opt => opt.label.trim() !== '');
        spinBtn.disabled = (filled.length < 2);
    }

    function playWinSound() {
        if (!audioCtx || muted) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.15);
        gain.gain.setValueAtTime(globalVolume * 0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + 0.2);
    }

    function spinAnimation() {
        if (!isSpinning) return;
        spinVelocity *= spinDecay;
        currentAngle += spinVelocity;
        drawWheel();

        const numSegments = options.length >= 2 ? options.length : MIN_SEGMENTS;
        const degPerSegment = 360 / numSegments;
        const currentDeg = currentAngle * (180 / Math.PI);
        const prevDeg = (currentAngle - spinVelocity) * (180 / Math.PI);
        if (Math.floor(currentDeg / degPerSegment) !== Math.floor(prevDeg / degPerSegment)) {
            bumpPin();
            playTickSound();
        }

        if (Math.abs(spinVelocity) < 0.01) {
            isSpinning = false;
            document.body.classList.remove('spinning');
            updateSpinButtonState();

            let result = '?';
            if (options.length > 0) {
                const totalWeight = options.reduce((sum, opt) => sum + (useWeights ? opt.weight : 1), 0);
                let rawAngle = ((currentAngle % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
                let accumulated = 0;
                for (let i = 0; i < options.length; i++) {
                    const weight = useWeights ? options[i].weight : 1;
                    const sliceAngle = (2 * Math.PI) * (weight / totalWeight);
                    if (rawAngle >= accumulated && rawAngle < accumulated + sliceAngle) {
                        result = options[i].label || 'Пусто';
                        break;
                    }
                    accumulated += sliceAngle;
                }
                if (result === '?') result = options[options.length - 1].label || 'Пусто';
            }
            document.getElementById('resultText').textContent = result;
            document.getElementById('resultOverlay').classList.add('active');
            playWinSound();

            document.getElementById('shareResultBtn').onclick = () => {
                const shareText = `🎉 Мне выпало: ${result}\nПопробуй и ты: @Fortunef3sBot`;
                tg.openTelegramLink(`https://t.me/share/url?url=&text=${encodeURIComponent(shareText)}`);
            };

            if (db && options.length >= 2 && currentUserTelegramId) {
                db.ref('users/' + currentUserTelegramId).transaction(user => {
                    if (user) user.spins = (user.spins || 0) + 1;
                    return user;
                });
            }
        } else {
            animationFrameId = requestAnimationFrame(spinAnimation);
        }
    }

    function startSpin() {
        const filled = options.filter(opt => opt.label.trim() !== '');
        if (isSpinning || filled.length < 2) return;
        isSpinning = true;
        document.body.classList.add('spinning');
        if (fastSpin) {
            spinVelocity = 0.3 + Math.random() * 0.4;
            spinDecay = 0.9;
        } else {
            spinVelocity = 0.5 + Math.random() * 0.8;
            spinDecay = 0.98;
        }
        if (animationFrameId) cancelAnimationFrame(animationFrameId);
        animationFrameId = requestAnimationFrame(spinAnimation);
    }

    function bumpPin() {
        pinElement.classList.add('bump');
        setTimeout(() => pinElement.classList.remove('bump'), 100);
    }
    function playTickSound() {
        if (!audioCtx || muted) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = 800 + Math.random() * 200;
        gain.gain.setValueAtTime(globalVolume * 0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.05);
        osc.start(); osc.stop(audioCtx.currentTime + 0.05);
    }

    // Панель опций
    const optionsListDiv = document.getElementById('optionsList');
    const chanceSwitch = document.getElementById('chanceSwitch');
    const fastSpinSwitch = document.getElementById('fastSpinSwitch');
    function renderOptions() {
        optionsListDiv.innerHTML = '';
        options.forEach((opt, idx) => {
            const row = document.createElement('div'); row.className = 'option-row';
            const input = document.createElement('input'); input.type = 'text'; input.value = opt.label;
            input.placeholder = 'Вариант ' + (idx + 1);
            input.addEventListener('input', e => {
                options[idx].label = e.target.value;
                drawWheel();
                updateSpinButtonState();
            });
            row.appendChild(input);
            if (useWeights) {
                const winp = document.createElement('input'); winp.type = 'number'; winp.className = 'weight-input'; winp.value = opt.weight; winp.min = 1;
                winp.addEventListener('input', e => { options[idx].weight = parseInt(e.target.value) || 1; drawWheel(); });
                row.appendChild(winp);
            }
            const del = document.createElement('button'); del.className = 'delete-option'; del.innerHTML = '×';
            del.addEventListener('click', () => {
                options.splice(idx, 1);
                renderOptions();
                drawWheel();
                updateSpinButtonState();
            });
            row.appendChild(del);
            optionsListDiv.appendChild(row);
        });
        if (options.length === 0 && !idleAnimationId) idleSpin();
        updateSpinButtonState();
        drawWheel();
    }
    document.getElementById('addOptionBtn').addEventListener('click', () => {
        options.push({ label: '', weight: 1 });
        renderOptions();
    });
    chanceSwitch.addEventListener('change', e => {
        useWeights = e.target.checked;
        if (!useWeights) options.forEach(o => o.weight = 1);
        renderOptions();
    });
    fastSpinSwitch.addEventListener('change', e => {
        fastSpin = e.target.checked;
    });
    spinBtn.addEventListener('click', startSpin);

    // Очистить всё
    document.getElementById('clearAllBtn').addEventListener('click', () => {
        if (options.length === 0) return;
        if (confirm('Вы уверены, что хотите удалить все варианты?')) {
            options = [];
            renderOptions();
        }
    });

    // Массовое добавление
    const massAddModal = document.getElementById('massAddModal');
    document.getElementById('massAddBtn').addEventListener('click', () => {
        massAddModal.classList.add('active');
    });
    document.getElementById('closeMassAddModal').addEventListener('click', () => {
        massAddModal.classList.remove('active');
    });
    document.getElementById('applyMassAdd').addEventListener('click', () => {
        const text = document.getElementById('massAddTextarea').value.trim();
        if (!text) return;
        // Разбиваем по запятым или переносам строк
        const raw = text.split(/[,\n]+/);
        raw.forEach(item => {
            const trimmed = item.trim();
            if (trimmed) {
                options.push({ label: trimmed, weight: 1 });
            }
        });
        document.getElementById('massAddTextarea').value = '';
        massAddModal.classList.remove('active');
        renderOptions();
    });

    // Пресеты
    const presetsModal = document.getElementById('presetsModal');
    const presetsBtn = document.getElementById('presetsBtn');
    const closePresetsModal = document.getElementById('closePresetsModal');
    const savePresetBtn = document.getElementById('savePresetBtn');
    const presetNameInput = document.getElementById('presetNameInput');
    const presetsList = document.getElementById('presetsList');

    function getPresets() {
        const presets = localStorage.getItem('wheel_presets');
        return presets ? JSON.parse(presets) : [];
    }
    function savePresets(presets) {
        localStorage.setItem('wheel_presets', JSON.stringify(presets));
    }
    function renderPresetsList() {
        const presets = getPresets();
        presetsList.innerHTML = '';
        presets.forEach((preset, idx) => {
            const li = document.createElement('li');
            const span = document.createElement('span');
            span.textContent = preset.name;
            li.appendChild(span);
            const loadBtn = document.createElement('button');
            loadBtn.textContent = 'Загрузить';
            loadBtn.addEventListener('click', () => {
                options = preset.options.map(o => ({...o}));
                renderOptions();
                presetsModal.classList.remove('active');
            });
            li.appendChild(loadBtn);
            const delBtn = document.createElement('button');
            delBtn.textContent = 'Удалить';
            delBtn.style.marginLeft = '5px';
            delBtn.addEventListener('click', () => {
                if (confirm(`Удалить пресет "${preset.name}"?`)) {
                    const updated = getPresets().filter((_, i) => i !== idx);
                    savePresets(updated);
                    renderPresetsList();
                }
            });
            li.appendChild(delBtn);
            presetsList.appendChild(li);
        });
    }
    presetsBtn.addEventListener('click', () => {
        renderPresetsList();
        presetsModal.classList.add('active');
    });
    closePresetsModal.addEventListener('click', () => {
        presetsModal.classList.remove('active');
    });
    savePresetBtn.addEventListener('click', () => {
        const name = presetNameInput.value.trim();
        if (!name) return;
        const presets = getPresets();
        presets.push({
            name: name,
            options: options.map(o => ({ label: o.label, weight: o.weight }))
        });
        savePresets(presets);
        presetNameInput.value = '';
        renderPresetsList();
    });

    document.getElementById('closeResultBtn').addEventListener('click', () => {
        document.getElementById('resultOverlay').classList.remove('active');
    });

    // Звук
    let audioCtx = null, muted = false, globalVolume = 0.5;
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    document.body.addEventListener('click', initAudio, { once: true });

    // Настройки
    const settingsModal = document.getElementById('settingsModal');
    document.getElementById('openSettings').addEventListener('click', () => {
        settingsModal.classList.add('active');
        if (db && currentUserTelegramId) {
            db.ref('users/' + currentUserTelegramId).once('value').then(snap => {
                const data = snap.val();
                if (data) document.getElementById('nicknameInput').value = data.nickname || '';
            });
        }
        document.getElementById('volumeSlider').value = globalVolume * 100;
        document.getElementById('volumeValue').textContent = Math.round(globalVolume * 100) + '%';
        document.getElementById('muteCheckbox').checked = muted;
    });
    document.getElementById('closeSettings').addEventListener('click', () => settingsModal.classList.remove('active'));
    document.getElementById('saveSettings').addEventListener('click', async () => {
        if (!currentUserTelegramId) { alert('Сначала войдите через Telegram.'); return; }
        if (!db) { alert('База данных не подключена.'); return; }
        const newNick = document.getElementById('nicknameInput').value.trim();
        if (newNick) {
            const snapshot = await db.ref('users').orderByChild('nickname').equalTo(newNick).once('value');
            let unique = true;
            snapshot.forEach(child => { if (child.key !== currentUserTelegramId) unique = false; });
            if (!unique) { alert('Этот никнейм уже занят!'); return; }
            await db.ref('users/' + currentUserTelegramId).update({ nickname: newNick });
            document.getElementById('userNickDisplay').textContent = newNick;
        }
        globalVolume = parseInt(document.getElementById('volumeSlider').value) / 100;
        muted = document.getElementById('muteCheckbox').checked;
        localStorage.setItem('volume', globalVolume * 100);
        localStorage.setItem('muted', muted ? '1' : '0');
        settingsModal.classList.remove('active');
    });
    window.addEventListener('click', e => { if (e.target.classList.contains('modal')) e.target.classList.remove('active'); });

    // Тема
    const themeToggle = document.getElementById('themeToggle');
    function setTheme(isLight) {
        document.body.classList.toggle('light-theme', isLight);
        themeToggle.setAttribute('data-theme', isLight ? 'light' : 'dark');
        themeToggle.textContent = isLight ? '☀️' : '🌙';
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
    }
    themeToggle.addEventListener('click', () => setTheme(!document.body.classList.contains('light-theme')));
    if (tg.themeParams) setTheme(tg.themeParams.bg_color !== '#18222d');
    tg.onEvent('themeChanged', () => { if (tg.themeParams) setTheme(tg.themeParams.bg_color !== '#18222d'); });

    function updateTime() { document.getElementById('localTime').textContent = new Date().toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit' }); }
    setInterval(updateTime, 1000); updateTime();

    const slogans = ["Крути судьбу смелее!","Твой выбор — твоя удача!","Вращай и побеждай!","Сегодня твой день!","Фортуна улыбается смелым!","Поверни колесо к успеху!","Шанс на миллион!","Реши, что важнее!","Пусть удача крутится с тобой!","Колесо решит всё!","Удача ждёт тебя!"];
    document.getElementById('slogan').textContent = slogans[Math.floor(Math.random() * slogans.length)];

    // Старт
    window.addEventListener('load', () => {
        if (options.length === 0) {
            options.push({ label: '', weight: 1 });
            options.push({ label: '', weight: 1 });
            renderOptions();
        }
        drawWheel();
        if (!isSpinning) idleSpin();
        if (localStorage.getItem('volume')) globalVolume = parseInt(localStorage.getItem('volume')) / 100;
        if (localStorage.getItem('muted') === '1') muted = true;
    });
</script>
</body>
