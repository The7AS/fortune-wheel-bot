<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Колесо фортуны</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #1a1a2e;
            --surface: #16213e;
            --text: #eee;
            --accent: #e94560;
            --input-bg: #0f3460;
            --border: #0f3460;
            --muted-text: #aaa;
        }
        body.light-theme {
            --bg: #f0f2f5;
            --surface: #ffffff;
            --text: #222;
            --accent: #c62828;
            --input-bg: #e0e0e0;
            --border: #ccc;
            --muted-text: #555;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s, color 0.3s;
        }
        .top-bar {
            width: 100%;
            max-width: 1400px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            gap: 20px;
        }
        .slogan {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--accent);
            flex: 1;
        }
        .right-group {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        #localTime {
            font-size: 1rem;
            background: var(--surface);
            padding: 6px 16px;
            border-radius: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        .theme-toggle {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            transition: transform 0.4s ease;
            line-height: 1;
        }
        .theme-toggle[data-theme="dark"]:hover { transform: rotate(12deg); }
        .theme-toggle[data-theme="dark"] { transform: rotate(0deg); }
        .theme-toggle[data-theme="light"]:hover { transform: scale(1.2); }
        .theme-toggle[data-theme="light"] { transform: scale(1); }
        .settings-btn {
            background: none;
            border: none;
            color: var(--text);
            font-size: 2rem;
            cursor: pointer;
            transition: transform 0.4s ease-out;
        }
        .settings-btn:hover {
            transform: rotate(720deg);
            transition: transform 1.2s cubic-bezier(.2,.8,.4,1);
        }
        .user-badge {
            display: none;
            align-items: center;
            gap: 8px;
            background: var(--surface);
            padding: 6px 15px;
            border-radius: 30px;
        }
        .user-badge img {
            width: 32px; height: 32px;
            border-radius: 50%;
            border: 2px solid var(--accent);
        }
        .main-container {
            display: grid;
            grid-template-columns: 240px 1fr 320px;
            gap: 30px;
            width: 100%;
            max-width: 1400px;
            align-items: start;
        }
        body.spinning .main-container {
            filter: blur(6px);
            pointer-events: none;
        }
        .leaderboard {
            background: var(--surface);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .leaderboard h2 { text-align: center; margin-bottom: 15px; font-size: 1.4rem; color: var(--accent); }
        .leaderboard ol { list-style: none; padding: 0; }
        .leaderboard li { padding: 10px 8px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .wheel-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .wheel-container {
            position: relative;
            width: 500px;
            height: 500px;
            transition: transform 0.4s;
        }
        body.spinning .wheel-container {
            transform: scale(1.4);
            z-index: 100;
        }
        canvas#wheelCanvas {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.6));
        }
        .pin {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 28px;
            height: 36px;
            z-index: 10;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
        }
        .pin svg { width: 100%; height: 100%; fill: var(--accent); }
        .pin.bump {
            animation: pinBump 0.1s ease;
        }
        @keyframes pinBump {
            0% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(8px); }
            100% { transform: translateX(-50%) translateY(0); }
        }
        .spin-btn {
            margin-top: 30px;
            padding: 14px 50px;
            font-size: 1.3rem;
            font-weight: 700;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            letter-spacing: 1px;
            box-shadow: 0 8px 20px rgba(233,69,96,0.5);
            transition: 0.3s;
        }
        .spin-btn:disabled {
            background: #555;
            cursor: not-allowed;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .options-panel {
            background: var(--surface);
            border-radius: 20px;
            padding: 20px;
        }
        .chance-toggle { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .switch { position: relative; width: 54px; height: 28px; }
        .switch input { display: none; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--accent); border-radius: 28px; transition: 0.3s; }
        .slider:before { position: absolute; content: ""; height: 22px; width: 22px; left: 3px; bottom: 3px; background-color: white; border-radius: 50%; transition: 0.3s; }
        input:checked + .slider { background-color: #4caf50; }
        input:checked + .slider:before { transform: translateX(26px); }
        .option-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .option-row input[type="text"] { flex: 1; padding: 10px; border-radius: 10px; border: none; background: var(--input-bg); color: var(--text); }
        .weight-input { width: 60px; padding: 10px; border-radius: 10px; border: none; background: var(--input-bg); color: #f5c518; text-align: center; }
        .delete-option { background: var(--accent); border: none; color: white; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 1.3rem; }
        .add-btn { width: 100%; padding: 12px; border: 2px dashed var(--accent); background: transparent; color: var(--accent); font-size: 2rem; border-radius: 14px; cursor: pointer; margin-top: 8px; }
        .result-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); display: flex; justify-content: center; align-items: center; z-index: 300; opacity: 0; pointer-events: none; transition: 0.3s; }
        .result-overlay.active { opacity: 1; pointer-events: auto; }
        .result-content { background: var(--surface); padding: 40px 60px; border-radius: 30px; text-align: center; transform: scale(0.8); transition: 0.3s; }
        .result-overlay.active .result-content { transform: scale(1); }
        .result-text { font-size: 3rem; font-weight: 700; color: var(--accent); }
        .modal { display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 200; opacity: 0; pointer-events: none; transition: 0.25s; }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal-content { background: var(--surface); padding: 30px; border-radius: 24px; width: 380px; transform: scale(0.9); transition: 0.25s; }
        .modal.active .modal-content { transform: scale(1); }
        .modal-content h2 { margin-bottom: 20px; }
        .modal-content input[type="text"], .modal-content input[type="range"] { width: 100%; padding: 10px; margin-bottom: 18px; border-radius: 10px; border: none; background: var(--input-bg); color: var(--text); }
        .modal-content button { padding: 10px 24px; border: none; border-radius: 30px; background: var(--accent); color: white; font-weight: 600; margin-right: 10px; }
        .volume-row { display: flex; align-items: center; gap: 12px; }
        @media (max-width: 1000px) {
            .main-container { grid-template-columns: 1fr; max-width: 500px; }
            .leaderboard { order: 2; }
            .wheel-wrapper { order: 1; }
            .options-panel { order: 3; }
            .top-bar { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="slogan" id="slogan">✨ Удача ждёт тебя!</div>
        <div class="right-group">
            <span id="localTime">00:00</span>
            <button class="theme-toggle" id="themeToggle" data-theme="dark">🌙</button>
            <div class="user-badge" id="userBadge">
                <img id="userAvatar" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='%23e94560'/%3E%3C/svg%3E" alt="avatar">
                <span id="userNickDisplay"></span>
            </div>
            <button class="settings-btn" id="openSettings">⚙️</button>
        </div>
    </div>
    <div class="main-container">
        <div class="leaderboard">
            <h2>🏆 Топ игроков</h2>
            <ol id="top-list"><li>Нет данных</li></ol>
        </div>
        <div class="wheel-wrapper">
            <div class="wheel-container" id="wheelContainer">
                <canvas id="wheelCanvas" width="500" height="500"></canvas>
                <div class="pin" id="pin">
                    <svg viewBox="0 0 28 36">
                        <path d="M14 36 C22 24 28 14 28 10 C28 4.5 21.7 0 14 0 C6.3 0 0 4.5 0 10 C0 14 6 24 14 36Z" />
                        <circle cx="14" cy="12" r="4.5" fill="white" />
                        <circle cx="14" cy="12" r="2" fill="#e0e0e0" />
                    </svg>
                </div>
            </div>
            <button class="spin-btn" id="spinButton" disabled>🎡 Крутить!</button>
        </div>
        <div class="options-panel">
            <div class="chance-toggle">
                <span class="toggle-label">🎲 Шансы</span>
                <label class="switch">
                    <input type="checkbox" id="chanceSwitch">
                    <span class="slider"></span>
                </label>
            </div>
            <div id="optionsList"></div>
            <button class="add-btn" id="addOptionBtn">+</button>
        </div>
    </div>
    <div class="result-overlay" id="resultOverlay">
        <div class="result-content">
            <span class="result-text" id="resultText"></span>
            <p style="margin-top:20px; color: var(--muted-text);">Нажмите Esc или кликните, чтобы закрыть</p>
        </div>
    </div>
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <h2>⚙️ Настройки</h2>
            <label>Никнейм</label>
            <input type="text" id="nicknameInput" placeholder="Твой ник...">
            <label>🔊 Громкость</label>
            <div class="volume-row">
                <input type="range" id="volumeSlider" min="0" max="100" value="50">
                <span id="volumeValue">50%</span>
            </div>
            <label><input type="checkbox" id="muteCheckbox"> 🔇 Без звука</label>
            <div style="margin-top:24px;">
                <button id="saveSettings">💾 Сохранить</button>
                <button id="closeSettings">✖ Закрыть</button>
            </div>
        </div>
    </div>

<script>
    // Telegram Mini App
    const tg = window.Telegram.WebApp;
    tg.ready();

    // Firebase (безопасная инициализация)
    let db = null;
    try {
        const firebaseConfig = {
            apiKey: "AIzaSyBG_pWCBwZZn0q5uq2qo7OyL1gE8Wy-ipw",
            authDomain: "fortunef3s-bot.firebaseapp.com",
            databaseURL: "https://fortunef3s-bot-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "fortunef3s-bot",
            storageBucket: "fortunef3s-bot.firebasestorage.app",
            messagingSenderId: "346933796337",
            appId: "1:346933796337:web:75264443e0c3de75273850"
        };
        firebase.initializeApp(firebaseConfig);
        db = firebase.database();
        console.log('Firebase ready');
    } catch (e) {
        console.warn('No Firebase:', e);
        document.querySelector('.leaderboard h2').textContent = '🏆 Топ (офлайн)';
    }

    let currentUserTelegramId = null;
    const initData = tg.initDataUnsafe;
    if (initData && initData.user) {
        const user = initData.user;
        currentUserTelegramId = user.id.toString();
        const firstName = user.first_name || 'Пользователь';
        const username = user.username || '';
        const photoUrl = user.photo_url || '';

        const badge = document.getElementById('userBadge');
        badge.style.display = 'flex';
        document.getElementById('userNickDisplay').textContent = firstName;
        if (photoUrl) document.getElementById('userAvatar').src = photoUrl;

        if (db) {
            const userRef = db.ref('users/' + currentUserTelegramId);
            userRef.once('value').then(snap => {
                if (!snap.exists()) {
                    userRef.set({
                        telegramId: currentUserTelegramId,
                        firstName, username, photoUrl,
                        nickname: firstName,
                        spins: 0,
                        createdAt: firebase.database.ServerValue.TIMESTAMP
                    });
                } else {
                    userRef.update({ firstName, username, photoUrl });
                }
                db.ref('users/' + currentUserTelegramId).on('value', snap => {
                    const data = snap.val();
                    if (data) document.getElementById('userNickDisplay').textContent = data.nickname || data.firstName;
                });
                loadLeaderboard();
            }).catch(err => console.warn(err));
        }
    }

    function loadLeaderboard() {
        if (!db) return;
        db.ref('users').orderByChild('spins').limitToLast(10).on('value', snap => {
            const topList = document.getElementById('top-list');
            topList.innerHTML = '';
            if (!snap.exists()) { topList.innerHTML = '<li>Нет данных</li>'; return; }
            const users = [];
            snap.forEach(child => users.push({ id: child.key, ...child.val() }));
            users.sort((a, b) => b.spins - a.spins);
            users.forEach((u, i) => {
                const li = document.createElement('li');
                li.innerHTML = `<span class="nick">${i+1}. ${u.nickname || u.firstName}</span> <span class="spins">${u.spins}</span>`;
                topList.appendChild(li);
            });
        });
    }

    // ----- КОЛЕСО ФОРТУНЫ (чистый canvas) -----
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const spinBtn = document.getElementById('spinButton');
    const pinElement = document.getElementById('pin');
    let options = [];            // { label, weight }
    let useWeights = false;
    let isSpinning = false;
    let currentAngle = 0;       // текущий угол поворота (в радианах)
    let spinVelocity = 0;       // скорость вращения (рад/сек)
    let spinDecay = 0.98;       // замедление
    let animationFrameId = null;
    const idleColors = ['#e94560','#0f3460','#f5c518','#16213e','#53d8a0','#a45ee9','#ff6b6b','#4ecdc4'];

    function drawWheel() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const segments = options.length > 0 ? options : [{ label: '', weight: 1 }, { label: '', weight: 1 }];
        const totalWeight = segments.reduce((sum, s) => sum + (useWeights ? s.weight : 1), 0);
        let startAngle = currentAngle;
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radius = Math.min(centerX, centerY) - 10;

        segments.forEach((seg, i) => {
            const sliceAngle = (2 * Math.PI) * (useWeights ? seg.weight : 1) / totalWeight;
            const endAngle = startAngle + sliceAngle;
            // Рисуем сектор
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, radius, startAngle, endAngle);
            ctx.closePath();
            ctx.fillStyle = idleColors[i % idleColors.length];
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();
            // Текст
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(startAngle + sliceAngle / 2);
            ctx.textAlign = "center";
            ctx.fillStyle = "#fff";
            ctx.font = "bold 16px Segoe UI";
            ctx.fillText(seg.label, radius * 0.7, 6);
            ctx.restore();
            startAngle = endAngle;
        });
        // Внешнее кольцо
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 4;
        ctx.stroke();
    }

    function idleSpin() {
        if (options.length === 0) {
            // Пустое колесо (просто вращаемся медленно)
            currentAngle += 0.02;
            drawWheel();
            animationFrameId = requestAnimationFrame(idleSpin);
            spinBtn.disabled = true;
        } else {
            spinBtn.disabled = options.length < 2;
        }
    }

    function spinAnimation() {
        if (!isSpinning) return;
        spinVelocity *= spinDecay;
        currentAngle += spinVelocity;
        drawWheel();
        // Щелчки каждые ~ 30° (имитация стопора)
        const degrees = currentAngle * (180 / Math.PI);
        if (Math.floor(degrees / 30) !== Math.floor((currentAngle - spinVelocity) * (180 / Math.PI) / 30)) {
            bumpPin();
            playTickSound();
        }
        if (Math.abs(spinVelocity) < 0.01) {
            // Остановка
            isSpinning = false;
            document.body.classList.remove('spinning');
            spinBtn.disabled = options.length < 2;
            // Определяем выигрышный сектор
            let result = '?';
            if (options.length > 0) {
                const segAngle = 2 * Math.PI / options.length;
                // Приводим угол к положительному и находим индекс
                let rawAngle = ((currentAngle % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
                const index = Math.floor(rawAngle / segAngle) % options.length;
                result = options[index].label || 'Пусто';
            }
            const overlay = document.getElementById('resultOverlay');
            document.getElementById('resultText').textContent = '🎉 ' + result;
            overlay.classList.add('active');
            if (db && options.length >= 2 && currentUserTelegramId) {
                db.ref('users/' + currentUserTelegramId).transaction(user => {
                    if (user) user.spins = (user.spins || 0) + 1;
                    return user;
                });
            }
        } else {
            animationFrameId = requestAnimationFrame(spinAnimation);
        }
    }

    function startSpin() {
        if (isSpinning || options.length < 2) return;
        isSpinning = true;
        document.body.classList.add('spinning');
        // Случайная начальная скорость
        spinVelocity = 0.5 + Math.random() * 0.8;
        if (animationFrameId) cancelAnimationFrame(animationFrameId);
        animationFrameId = requestAnimationFrame(spinAnimation);
    }

    function bumpPin() {
        pinElement.classList.add('bump');
        setTimeout(() => pinElement.classList.remove('bump'), 100);
    }
    function playTickSound() {
        if (!audioCtx || muted) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = 800 + Math.random() * 200;
        gain.gain.setValueAtTime(globalVolume * 0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.05);
        osc.start(); osc.stop(audioCtx.currentTime + 0.05);
    }

    // Панель опций
    const optionsListDiv = document.getElementById('optionsList');
    const chanceSwitch = document.getElementById('chanceSwitch');
    function renderOptions() {
        optionsListDiv.innerHTML = '';
        options.forEach((opt, idx) => {
            const row = document.createElement('div'); row.className = 'option-row';
            const input = document.createElement('input'); input.type = 'text'; input.value = opt.label;
            input.placeholder = 'Вариант ' + (idx + 1);
            input.addEventListener('input', e => { options[idx].label = e.target.value; drawWheel(); });
            row.appendChild(input);
            if (useWeights) {
                const winp = document.createElement('input'); winp.type = 'number'; winp.className = 'weight-input'; winp.value = opt.weight; winp.min = 1;
                winp.addEventListener('input', e => { options[idx].weight = parseInt(e.target.value) || 1; drawWheel(); });
                row.appendChild(winp);
            }
            const del = document.createElement('button'); del.className = 'delete-option'; del.innerHTML = '×';
            del.addEventListener('click', () => { options.splice(idx, 1); renderOptions(); drawWheel(); });
            row.appendChild(del);
            optionsListDiv.appendChild(row);
        });
        if (options.length === 0) {
            if (!animationFrameId) idleSpin();
        }
    }
    document.getElementById('addOptionBtn').addEventListener('click', () => {
        options.push({ label: '', weight: 1 });
        renderOptions();
        drawWheel();
    });
    chanceSwitch.addEventListener('change', e => {
        useWeights = e.target.checked;
        if (!useWeights) options.forEach(o => o.weight = 1);
        renderOptions();
        drawWheel();
    });
    spinBtn.addEventListener('click', startSpin);

    // Звук
    let audioCtx = null, muted = false, globalVolume = 0.5;
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    document.body.addEventListener('click', initAudio, { once: true });

    // Настройки
    const settingsModal = document.getElementById('settingsModal');
    document.getElementById('openSettings').addEventListener('click', () => {
        settingsModal.classList.add('active');
        if (db && currentUserTelegramId) {
            db.ref('users/' + currentUserTelegramId).once('value').then(snap => {
                const data = snap.val();
                if (data) document.getElementById('nicknameInput').value = data.nickname || '';
            });
        }
        document.getElementById('volumeSlider').value = globalVolume * 100;
        document.getElementById('volumeValue').textContent = Math.round(globalVolume * 100) + '%';
        document.getElementById('muteCheckbox').checked = muted;
    });
    document.getElementById('closeSettings').addEventListener('click', () => settingsModal.classList.remove('active'));
    document.getElementById('saveSettings').addEventListener('click', async () => {
        if (!currentUserTelegramId) { alert('Сначала войдите через Telegram.'); return; }
        if (!db) { alert('База данных не подключена.'); return; }
        const newNick = document.getElementById('nicknameInput').value.trim();
        if (newNick) {
            const snapshot = await db.ref('users').orderByChild('nickname').equalTo(newNick).once('value');
            let unique = true;
            snapshot.forEach(child => { if (child.key !== currentUserTelegramId) unique = false; });
            if (!unique) { alert('Этот никнейм уже занят!'); return; }
            await db.ref('users/' + currentUserTelegramId).update({ nickname: newNick });
            document.getElementById('userNickDisplay').textContent = newNick;
        }
        globalVolume = parseInt(document.getElementById('volumeSlider').value) / 100;
        muted = document.getElementById('muteCheckbox').checked;
        localStorage.setItem('volume', globalVolume * 100);
        localStorage.setItem('muted', muted ? '1' : '0');
        settingsModal.classList.remove('active');
    });
    window.addEventListener('click', e => { if (e.target.classList.contains('modal')) e.target.classList.remove('active'); });

    // Тема
    const themeToggle = document.getElementById('themeToggle');
    function setTheme(isLight) {
        document.body.classList.toggle('light-theme', isLight);
        themeToggle.setAttribute('data-theme', isLight ? 'light' : 'dark');
        themeToggle.textContent = isLight ? '☀️' : '🌙';
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
    }
    themeToggle.addEventListener('click', () => setTheme(!document.body.classList.contains('light-theme')));
    if (tg.themeParams) setTheme(tg.themeParams.bg_color !== '#18222d');
    tg.onEvent('themeChanged', () => { if (tg.themeParams) setTheme(tg.themeParams.bg_color !== '#18222d'); });

    function updateTime() { document.getElementById('localTime').textContent = new Date().toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit' }); }
    setInterval(updateTime, 1000); updateTime();

    const slogans = ["Крути судьбу смелее!","Твой выбор — твоя удача!","Вращай и побеждай!","Сегодня твой день!","Фортуна улыбается смелым!","Поверни колесо к успеху!","Шанс на миллион!","Реши, что важнее!","Пусть удача крутится с тобой!","Колесо решит всё!","Удача ждёт тебя!"];
    document.getElementById('slogan').textContent = slogans[Math.floor(Math.random() * slogans.length)];

    // Старт
    window.addEventListener('load', () => {
        if (options.length === 0) {
            options.push({ label: '', weight: 1 });
            options.push({ label: '', weight: 1 });
            renderOptions();
        }
        drawWheel();
        if (!isSpinning) idleSpin(); // медленное вращение, пока нет вариантов
        if (localStorage.getItem('volume')) globalVolume = parseInt(localStorage.getItem('volume')) / 100;
        if (localStorage.getItem('muted') === '1') muted = true;
    });
</script>
</body>
</html>
